<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0;
  }
  #toast {
    width: 340px;
    background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
    border: 1px solid rgba(100, 180, 255, 0.25);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.45),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    color: #ffffff;
    font-size: 13px;
    line-height: 1.4;
    user-select: none;
    flex-direction: column;
    gap: 6px;
  }
  #toast .row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #toast .icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(80, 160, 255, 0.18);
    border: 1.5px solid rgba(120, 200, 255, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  #toast .info {
    flex: 1;
    min-width: 0;
  }
  #toast .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(180, 220, 255, 0.7);
    margin-bottom: 2px;
  }
  #toast .caller {
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #toast .number {
    font-size: 12px;
    color: rgba(200, 230, 255, 0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #toast .time {
    font-size: 10px;
    color: rgba(160, 200, 240, 0.6);
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div id="toast">
    <div class="row">
      <div class="icon">📞</div>
      <div class="info">
        <div class="label">Incoming Call</div>
        <div class="caller" id="caller-name">Unknown Caller</div>
        <div class="number" id="caller-number"></div>
        <div class="time" id="caller-time"></div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const hash = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);
      const callerName = params.get('callerName') || 'Unknown Caller';
      const callerNumber = params.get('callerNumber') || '';
      const timestamp = params.get('timestamp') || '';
      document.getElementById('caller-name').textContent = callerName;
      const numberEl = document.getElementById('caller-number');
      numberEl.textContent = callerNumber;
      if (!callerNumber) numberEl.style.display = 'none';
      const timeEl = document.getElementById('caller-time');
      if (timestamp) {
        const d = new Date(parseInt(timestamp, 10));
        if (!isNaN(d)) timeEl.textContent = d.toLocaleTimeString();
      }
      if (!timestamp) timeEl.style.display = 'none';
    })();
  </script>
</body>
</html>
