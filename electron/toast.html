<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:'Segoe UI',system-ui,sans-serif}
.toast{
  width:100%;height:100%;
  background:#1a1a2e;
  border-radius:16px;
  border:2px solid rgba(96,205,255,0.4);
  box-shadow:0 12px 40px rgba(0,0,0,0.8),0 0 60px rgba(96,205,255,0.15);
  overflow:hidden;
  position:relative;
  animation:slideIn .35s cubic-bezier(.16,1,.3,1) forwards;
  display:none;
}
.toast.visible{display:block}
@keyframes slideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:0}}
.accent{position:absolute;top:0;left:0;width:5px;height:100%;background:#60cdff;box-shadow:0 0 12px #60cdff}
.body{padding:14px 16px 14px 20px;display:flex;gap:12px;height:100%}
.icon{
  width:44px;height:44px;border-radius:50%;
  background:rgba(96,205,255,0.2);
  display:grid;place-items:center;
  flex-shrink:0;position:relative
}
.ping{
  position:absolute;top:-2px;right:-2px;
  width:12px;height:12px;border-radius:50%;
  background:#6ccb5f;
  animation:pulse 1.2s ease-in-out infinite
}
.info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.title{font-size:13px;font-weight:600;color:#60cdff;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.number{font-size:22px;font-weight:700;color:#fff;letter-spacing:.5px}
.name{font-size:14px;color:rgba(255,255,255,0.7);margin-top:3px}
.time{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px}
.progress{position:absolute;bottom:0;left:0;width:100%;height:4px;background:rgba(96,205,255,0.1)}
.progress-bar{height:100%;width:100%;background:#60cdff;transition:width 100ms linear}
</style>
</head>
<body>
<div class="toast" id="toast">
  <div class="accent"></div>
  <div class="body">
    <div class="icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#60cdff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <div class="ping"></div>
    </div>
    <div class="info">
      <div class="title" id="title">Incoming Call</div>
      <div class="number" id="number">Waiting...</div>
      <div class="name" id="name"></div>
      <div class="time" id="time"></div>
    </div>
  </div>
  <div class="progress"><div class="progress-bar" id="progress"></div></div>
</div>
<script>
(function(){
  // Parse data from URL hash
  // Format: toast.html#callerNumber=555&callerName=John&duration=10&style=custom&bgColor=...
  var hash = window.location.hash.substring(1);
  var params = {};
  if (hash) {
    var pairs = hash.split('&');
    for (var i = 0; i < pairs.length; i++) {
      var kv = pairs[i].split('=');
      if (kv.length === 2) {
        params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1].replace(/\+/g, ' '));
      }
    }
  }

  // Apply data to the UI
  var toastEl = document.getElementById('toast');
  var numberEl = document.getElementById('number');
  var nameEl = document.getElementById('name');
  var timeEl = document.getElementById('time');
  var progressEl = document.getElementById('progress');

  if (params.callerNumber) numberEl.textContent = params.callerNumber;
  if (params.callerName) nameEl.textContent = params.callerName;
  if (params.timestamp) {
    try { timeEl.textContent = new Date(params.timestamp).toLocaleTimeString(); } catch(e) {}
  }

  // Apply custom styling if provided
  if (params.bgColor) toastEl.style.background = params.bgColor;
  if (params.accentColor) {
    document.querySelector('.accent').style.background = params.accentColor;
    document.querySelector('.accent').style.boxShadow = '0 0 12px ' + params.accentColor;
    document.querySelector('.icon').style.background = params.accentColor + '20';
    var svg = document.querySelector('.icon svg');
    if (svg) svg.setAttribute('stroke', params.accentColor);
    progressEl.style.background = params.accentColor;
    document.querySelector('.progress').style.background = params.accentColor + '10';
    document.getElementById('title').style.color = params.accentColor;
  }
  if (params.textColor) {
    numberEl.style.color = params.textColor;
    nameEl.style.color = 'rgba(' + hexToRgb(params.textColor) + ',0.7)';
    timeEl.style.color = 'rgba(' + hexToRgb(params.textColor) + ',0.4)';
  }
  if (params.borderRadius) toastEl.style.borderRadius = params.borderRadius + 'px';
  if (params.opacity) toastEl.style.opacity = (parseInt(params.opacity, 10) / 100);

  // Show the toast
  toastEl.classList.add('visible');

  // Duration and progress bar
  var duration = parseInt(params.duration, 10) || 10;
  var durationMs = duration * 1000;
  var start = Date.now();
  var closed = false;

  function updateProgress() {
    if (closed) return;
    var elapsed = Date.now() - start;
    var remaining = Math.max(0, durationMs - elapsed);
    progressEl.style.width = (remaining / durationMs * 100) + '%';
    if (remaining > 0) {
      requestAnimationFrame(updateProgress);
    }
  }
  requestAnimationFrame(updateProgress);

  // Auto-close after duration
  setTimeout(function(){
    if (!closed) {
      closed = true;
      window.close();
    }
  }, durationMs + 500);

  function hexToRgb(hex) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    var r = parseInt(hex.substring(0,2), 16);
    var g = parseInt(hex.substring(2,4), 16);
    var b = parseInt(hex.substring(4,6), 16);
    return r+','+g+','+b;
  }
})();
</script>
</body>
</html>
