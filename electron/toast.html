<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0;
    -webkit-user-select: none;
    user-select: none;
  }
  #toast {
    width: 380px;
    background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
    border: 1px solid rgba(100, 180, 255, 0.25);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow:
      0 10px 40px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(255, 255, 255, 0.08) inset;
    color: #ffffff;
    font-size: 13px;
    line-height: 1.4;
    flex-direction: column;
    gap: 6px;
    -webkit-app-region: drag;
  }
  #toast .row {
    display: flex;
    align-items: center;
    gap: 10px;
    -webkit-app-region: no-drag;
  }
  #toast .icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(80, 160, 255, 0.2);
    border: 1.5px solid rgba(120, 200, 255, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  #toast .info { flex: 1; min-width: 0; }
  #toast .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(180, 220, 255, 0.75);
    margin-bottom: 2px;
  }
  #toast .caller {
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #toast .number {
    font-size: 13px;
    color: rgba(200, 230, 255, 0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #toast .time {
    font-size: 10px;
    color: rgba(160, 200, 240, 0.7);
    margin-top: 2px;
  }
  #toast .status {
    font-size: 10px;
    color: rgba(160, 200, 240, 0.7);
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div id="toast">
    <div class="row">
      <div class="icon">📞</div>
      <div class="info">
        <div class="label">Incoming Call</div>
        <div class="caller" id="caller-name">Unknown Caller</div>
        <div class="number" id="caller-number"></div>
        <div class="time" id="caller-time"></div>
        <div class="status" id="caller-status"></div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const hash = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);

      const callerName = params.get('callerName') || 'Unknown Caller';
      const callerNumber = params.get('callerNumber') || '';
      const timestamp = params.get('timestamp') || '';
      const duration = parseInt(params.get('duration') || '8', 10);
      const bgColor = params.get('bgColor') || '#1a3a5c';
      const textColor = params.get('textColor') || '#ffffff';
      const accentColor = params.get('accentColor') || '#60cdff';

      const toast = document.getElementById('toast');
      toast.style.background = bgColor;
      toast.style.borderRadius = '12px';

      document.getElementById('caller-name').textContent = callerName;
      document.getElementById('caller-name').style.color = textColor;
      const numberEl = document.getElementById('caller-number');
      numberEl.textContent = callerNumber;
      numberEl.style.color = textColor;
      const timeEl = document.getElementById('caller-time');
      timeEl.style.color = accentColor;
      const statusEl = document.getElementById('caller-status');
      statusEl.style.color = accentColor;

      if (!callerNumber) numberEl.style.display = 'none';

      const timeEl = document.getElementById('caller-time');
      if (timestamp) {
        const d = new Date(parseInt(timestamp, 10));
        if (!isNaN(d)) timeEl.textContent = d.toLocaleTimeString();
      } else {
        timeEl.style.display = 'none';
      }
      if (!duration) statusEl.style.display = 'none';

      // Auto-hide to match caller-configured duration so the toast behaves like
      // a real notification instead of persisting forever.
      const durationMs = Math.max(2000, (Number.isFinite(duration) ? duration : 8) * 1000);
      const hideAt = Date.now() + durationMs;
      const statusEl = document.getElementById('caller-status');

      function tick() {
        const remaining = Math.max(0, hideAt - Date.now());
        if (remaining <= 0) {
          try { window.close(); } catch {}
          return;
        }
        const secs = Math.ceil(remaining / 1000);
        statusEl.textContent = secs + 's';
        requestAnimationFrame(tick);
      }
      tick();
    })();
  </script>
</body>
</html>
