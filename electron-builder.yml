# electron-builder config for CallerFlash

appId: com.callerflash.app
productName: CallerFlash

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - "!node_modules/**/*"

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CallerFlash

# Publish is handled by gh CLI in the workflow — not by electron-builder
publish: null
