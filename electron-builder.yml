# electron-builder config for CallerFlash

appId: com.callerflash.app
productName: CallerFlash

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - "!node_modules/**/*"

artifactName: "CallerFlash-${version}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  # .deb only — AppImage extraction fails intermittently in CI runners
  # (the cached appimage-12.0.1.7z tarball sometimes can't be lstat'd),
  # and snap requires `snapcraft` which isn't installed on the standard
  # ubuntu-latest image. .deb works cleanly on Ubuntu / Debian / Mint.
  target:
    - target: deb
      arch:
        - x64
  category: Network
  maintainer: jaydenrussell <jaydenrussell@hotmail.com>
  vendor: CallerFlash
  synopsis: SIP-compliant Windows / Linux client with toast notifications
  description: |
    CallerFlash is a SIP-compliant desktop client with toast
    notifications, clipboard auto-copy, and a system-tray background
    listener. Works with any RFC-compliant SIP provider.
  desktop:
    entry:
      Name: CallerFlash
      Comment: SIP client with toast notifications
      Categories: Network;Telephony;Communication
      Keywords: SIP;VoIP;telephony;
      StartupWMClass: callerflash
      desktopName: callerflash
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CallerFlash
  installerIcon: build/cflogo.ico
  uninstallerIcon: build/cflogo.ico
  installerHeaderIcon: build/cflogo.ico
  runAfterFinish: true

# Publish config — required for electron-builder to generate the
# `latest.yml` / `beta.yml` / `nightly.yml` update manifests consumed
# by electron-updater at install time. Actual publishing is performed
# by the workflow via softprops/action-gh-release, NOT by electron-builder
# itself (the workflow runs electron-builder with --publish never).
publish:
  provider: github
  owner: jaydenrussell
  repo: CallerFlash

extraResources:
  - from: build/cflogo.ico
    to: cflogo.ico
  - from: build/cflogo.png
    to: cflogo.png
