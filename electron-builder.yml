appId: com.callerflash.app
productName: CallerFlash
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CallerFlash
