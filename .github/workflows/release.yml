name: Build, Sign & Release

on:
  workflow_call:
    inputs:
      channel:
        description: 'Release channel: "stable" | "beta" | "alpha"'
        required: true
        type: string
      version_override:
        description: 'Optional explicit version (e.g. "1.5.0" or "1.5.0-beta.3"). Skips auto-increment.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  route:
    name: Determine version
    runs-on: windows-latest
    outputs:
      channel: ${{ steps.decide.outputs.channel }}
      version: ${{ steps.decide.outputs.version }}
      prerelease: ${{ steps.decide.outputs.prerelease }}
      release_name: ${{ steps.decide.outputs.release_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Compute next version
        id: decide
        shell: bash
        run: |
          CHANNEL="${{ inputs.channel }}"
          OVERRIDE="${{ inputs.version_override }}"
          VERSION=$(node scripts/next-version.cjs "$CHANNEL" "$OVERRIDE")
          if [[ -z "$VERSION" ]]; then
            echo "::error::next-version.cjs returned empty version"
            exit 1
          fi

          if [[ "$CHANNEL" == "stable" ]]; then
            PRERELEASE="false"
          else
            PRERELEASE="true"
          fi

          echo "channel=${CHANNEL}"            >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"            >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}"      >> "$GITHUB_OUTPUT"

          case "$CHANNEL" in
            alpha)
              echo "release_name=CallerFlash ${VERSION} (Alpha)" >> "$GITHUB_OUTPUT"
              ;;
            beta)
              BETA_BASE="${VERSION%%-*}"
              BETA_NUM="${VERSION##*-}"
              echo "release_name=CallerFlash v${BETA_BASE}-${BETA_NUM}.beta" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "release_name=CallerFlash v${VERSION}" >> "$GITHUB_OUTPUT"
              ;;
          esac

          echo "Channel: ${CHANNEL}  Version: ${VERSION}  Pre-release: ${PRERELEASE}"

  verify-secrets:
    name: Verify signing secrets are configured
    needs: route
    runs-on: windows-latest
    steps:
      - name: Check required signing secrets
        shell: bash
        run: |
          MISSING=0
          if [[ -z "${{ secrets.WIN_CSC_LINK }}" ]]; then
            echo "::error::Secret WIN_CSC_LINK is not set."
            MISSING=1
          fi
          if [[ -z "${{ secrets.WIN_CSC_KEY_PASSWORD }}" ]]; then
            echo "::error::Secret WIN_CSC_KEY_PASSWORD is not set."
            MISSING=1
          fi
          if [[ -z "${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}" ]]; then
            echo "::error::Secret RELEASE_SIGNING_PRIVATE_KEY is not set."
            MISSING=1
          fi
          if [[ "$MISSING" -ne 0 ]]; then
            exit 1
          fi
          echo "All required signing secrets are present."

  build:
    name: Build Windows (${{ needs.route.outputs.channel }})
    needs: [route, verify-secrets]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Bump version
        shell: bash
        run: |
          VERSION="${{ needs.route.outputs.version }}"
          CHANNEL="${{ needs.route.outputs.channel }}"
          ARTIFACT="CallerFlash-${VERSION}.${ext}"
          node -e "\
            const fs = require('fs');\
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));\
            pkg.version = '${VERSION}';\
            pkg.build.artifactName = '${ARTIFACT}';\
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');\
          "
          echo "BUILD_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "RELEASE_CHANNEL=${CHANNEL}" >> $GITHUB_ENV

      - name: Install dependencies
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build UI (Vite)
        run: npm run build

      - name: Package Electron App
        shell: bash
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          npx electron-builder --publish never

      - name: Generate update manifest
        shell: bash
        run: |
          VERSION="${{ needs.route.outputs.version }}"
          node scripts/generate-latest-yml.cjs release "$VERSION" latest.yml latest
          ls -la release/

      - name: Stage build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: callerflash-build-${{ needs.route.outputs.version }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
            release/beta.yml
            release/alpha.yml
          retention-days: 1
          if-no-files-found: error

  sign-checksums:
    name: Sign SHA256SUMS (Ed25519)
    needs: [route, build]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v6
        with:
          name: callerflash-build-${{ needs.route.outputs.version }}
          path: release

      - name: Verify required inputs
        shell: bash
        run: |
          if [[ -z "${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}" ]]; then
            echo "::error::RELEASE_SIGNING_PRIVATE_KEY secret is missing"
            exit 1
          fi
          if ! ls release/*.exe >/dev/null 2>&1; then
            echo "::error::No .exe files downloaded from build artifact"
            exit 1
          fi
          if [[ ! -f release/latest.yml ]]; then
            echo "::error::latest.yml not found in build artifact"
            exit 1
          fi

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release
          sha256sum *.exe > SHA256SUMS

      - name: Sign SHA256SUMS with Ed25519
        shell: bash
        env:
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          $keyDir = New-Item -ItemType Directory -Path (Join-Path $env:TEMP ([System.Guid]::NewGuid().ToString()))
          $keyPath = Join-Path $keyDir 'release-signing.key'
          [IO.File]::WriteAllText($keyPath, [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($env:RELEASE_SIGNING_PRIVATE_KEY)))
          Set-ItemProperty -Path $keyPath -Name IsReadOnly -Value $false
          Push-Location release
          Get-ChildItem *.exe | ForEach-Object {
            $sig = "$($_.FullName).sig"
            openssl pkeyutl -sign -rawin -in SHA256SUMS -inkey $keyPath -out $sig
          }
          Pop-Location

      - name: Generate channel-specific update manifest
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          CHANNEL="${{ needs.route.outputs.channel }}"
          VERSION="${{ needs.route.outputs.version }}"
          case "$CHANNEL" in
            beta)
              node "$GITHUB_WORKSPACE/scripts/generate-latest-yml.cjs" release "$VERSION" beta.yml beta
              ;;
            alpha)
              node "$GITHUB_WORKSPACE/scripts/generate-latest-yml.cjs" release "$VERSION" alpha.yml alpha
              ;;
            stable)
              echo "Stable channel: latest.yml already generated in build job"
              ;;
          esac
          ls -la release/

      - name: Stage signed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: callerflash-signed-${{ needs.route.outputs.version }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
            release/beta.yml
            release/alpha.yml
            release/SHA256SUMS
            release/*.sig
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [route, build, sign-checksums]
    if: >-
      needs.route.result == 'success' &&
      needs.build.result == 'success' &&
      needs.sign-checksums.result == 'success'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v6
        with:
          name: callerflash-signed-${{ needs.route.outputs.version }}
          path: release

      - name: Determine release assets
        id: assets
        shell: bash
        run: |
          CHANNEL="${{ needs.route.outputs.channel }}"
          VER="${{ needs.route.outputs.version }}"
          ASSETS_PARTS=(
            "release/*.exe"
            "release/*.blockmap"
            "release/SHA256SUMS"
            "release/*.sig"
          )
          case "$CHANNEL" in
            stable)  ASSETS_PARTS+=( "release/latest.yml" ) ;;
            beta)    ASSETS_PARTS+=( "release/beta.yml" ) ;;
            alpha)   ASSETS_PARTS+=( "release/alpha.yml" ) ;;
          esac
          NL=$'\n'
          ASSETS=$(IFS="$NL"; echo "${ASSETS_PARTS[*]}")
          {
            echo "files<<EOF"
            echo "$ASSETS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Attachments:"
          printf '%s\n' "$ASSETS" | sed 's/^/  /'

      - name: Generate release notes
        shell: bash
        env:
          VERSION: ${{ needs.route.outputs.version }}
          CHANNEL: ${{ needs.route.outputs.channel }}
        run: |
          node scripts/generate-release-notes.cjs "$CHANNEL" "$VERSION" release-notes.md
          echo "--- generated release-notes.md ---"
          cat release-notes.md

      - name: Create tag + GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ format('v{0}', needs.route.outputs.version) }}
          name: ${{ needs.route.outputs.release_name }}
          body_path: release-notes.md
          prerelease: ${{ needs.route.outputs.prerelease }}
          draft: false
          make_latest: ${{ needs.route.outputs.channel == 'stable' }}
          files: ${{ steps.assets.outputs.files }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
