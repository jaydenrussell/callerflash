name: Release — Alpha

# Triggered by:
#   • push to the `nightly` branch (auto-synced from main via PAT)
#   • daily schedule (03:00 UTC)
#   • manual dispatch
#
# Build context: the `nightly` branch HEAD (mirrors main).
# Promote to beta by manually dispatching the beta workflow.

on:
  push:
    branches:
      - alpha
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      channel: alpha
    secrets: inherit
