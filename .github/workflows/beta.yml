name: Release — Beta

# Triggered by manual dispatch ONLY.
# Automatically merges the latest nightly branch before building.
#
# Build context: the merged result (nightly → beta).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-release:
    name: Merge nightly → beta + Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Merge nightly into beta
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin nightly
          git checkout beta || git checkout -b beta
          git reset origin/beta --hard
          git merge origin/nightly --no-ff -m "chore: merge nightly → beta for release" || true

      - name: Push beta
        run: git push origin beta --force

      - name: Release
        uses: ./.github/workflows/release.yml
        with:
          channel: beta
        secrets: inherit