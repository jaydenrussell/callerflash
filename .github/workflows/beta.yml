name: Release — Beta

# Triggered by manual dispatch ONLY.
# To promote from nightly → beta:
#   1. Merge main into the beta branch
#   2. Manually dispatch this workflow
#
# Build context: the `beta` branch HEAD.
# Promote to stable by manually dispatching the stable workflow.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      channel: beta
      prerelease: true
    secrets: inherit
