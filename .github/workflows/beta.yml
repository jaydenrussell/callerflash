name: Release — Beta

# Triggered by manual dispatch ONLY.
# Automatically merges the latest alpha branch before building.
#
# Build context: the merged result (alpha → beta).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Merge alpha → beta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Merge alpha into beta
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin alpha
          git checkout beta || git checkout -b beta
          git reset origin/beta --hard
          git merge origin/alpha --no-ff -m "chore: merge alpha → beta for release" || true

      - name: Push beta
        run: git push origin beta --force

  release:
    name: Build & Release
    needs: sync
    uses: ./.github/workflows/release.yml
    with:
      channel: beta
    secrets: inherit