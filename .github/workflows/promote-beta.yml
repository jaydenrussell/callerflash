name: Promote → Beta

# Triggers:
#   • Manual dispatch from the Actions tab ("Run workflow")
#
# Builds the `beta` channel. Calls the reusable engine in
# `.github/workflows/release.yml` with channel=beta.
#
# Auto-increments `-beta.N` from existing tags unless `version_override`
# is provided (e.g., for emergency re-builds of a specific beta).

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Optional explicit version (e.g. "1.5.0-beta.3"). Leave empty to auto-increment.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  beta:
    name: Beta build
    uses: ./.github/workflows/release.yml
    with:
      channel: beta
      version_override: ${{ inputs.version_override }}
    secrets: inherit
