name: CI — Pull Request Checks

on:
  pull_request:
    branches: [main, stable, beta, nightly]
  push:
    branches:
      - 'feature/**'
      - 'fix/**'

permissions:
  contents: read

jobs:
  lint-build:
    name: Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
