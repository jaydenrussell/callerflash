name: Release — Nightly

# Triggers:
#   • Scheduled — every night at 03:00 UTC
#   • Push to `nightly` branch (auto-sync from `main`)
#   • Push to `main` branch (auto-sync per SETUP.md)
#   • Manual dispatch
#
# Always builds the `nightly` channel. Calls the reusable engine in
# `.github/workflows/release.yml` with channel=nightly.

on:
  schedule:
    # 03:00 UTC daily
    - cron: '0 3 * * *'
  push:
    branches:
      - nightly
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly:
    name: Nightly build
    uses: ./.github/workflows/release.yml
    with:
      channel: nightly
    secrets: inherit
