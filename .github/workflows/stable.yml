name: Release — Stable

# Triggered by manual dispatch ONLY.
# Automatically merges the latest beta branch before building.
#
# Build context: the merged result (beta → stable).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Merge beta → stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Merge beta into stable
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin beta
          git checkout stable || git checkout -b stable
          git reset origin/stable --hard
          git merge origin/beta --no-ff -m "chore: merge beta → stable for release" || true

      - name: Push stable
        run: git push origin stable --force

  release:
    name: Build & Release
    needs: sync
    uses: ./.github/workflows/release.yml
    with:
      channel: stable
    secrets: inherit