name: Release — Stable

# Triggered by manual dispatch ONLY.
# To promote from beta → stable:
#   1. Merge beta into the stable branch
#   2. Manually dispatch this workflow
#
# Build context: the `stable` branch HEAD.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      channel: stable
    secrets: inherit
