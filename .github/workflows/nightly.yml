name: Release — Nightly

# Triggered by:
#   • push to the `main` branch (automatic nightly for every commit)
#   • daily schedule (03:00 UTC)
#   • manual dispatch
#
# Build context: the `main` branch HEAD.
# Promote to beta by manually dispatching the beta workflow.

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      channel: nightly
    secrets: inherit
